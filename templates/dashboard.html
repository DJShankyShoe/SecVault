<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecVault - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/hash-wasm@4/dist/argon2.umd.min.js"></script>
</head>
<body>
    <div class="dashboard">
        <div class="dashboard-header">
            <div class="logo">
                <div class="logo-icon">🔐</div>
                <div class="logo-text">Sec<span>Vault</span></div>
            </div>
            <div>
                <div style="color: var(--muted); font-family: var(--mono); font-size: .85rem; margin-bottom: 0.5rem;">
                    <strong id="user-email">Loading...</strong>
                </div>
                <button id="logout-btn" class="btn btn-secondary" style="width: auto; padding: .5rem 1rem; font-size: .85rem;">
                    Sign Out
                </button>
            </div>
        </div>
        
        <div style="max-width: 900px; margin: 0 auto;">
            <div class="file-upload-section">
                <h2 class="section-title">Upload File</h2>
                <form id="upload-form" class="upload-form">
                    <div class="field">
                        <input type="file" id="file-input" required>
                    </div>
                    <button type="submit" id="upload-btn" class="btn btn-primary">
                        Upload
                    </button>
                </form>
            </div>
            
            <div>
                <h2 class="section-title">Your Files</h2>
                <div id="file-list" class="file-list">
                    <div style="text-align:center;padding:2rem;color:var(--muted)">
                        <span class="spinner"></span> Loading...
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast-container"></div>
    
    <script type="module">
        import { initDashboard } from '/static/js/dashboard.js';
        import '/static/js/acl.js';
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
