<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Check — SecVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div class="wrap">
        <div class="card">
            <div class="logo">
                <div class="logo-icon">🔍</div>
                <div class="logo-text">Browser <span>Check</span></div>
            </div>
            
            <div class="title">Checking compatibility...</div>
            <div class="sub">// Testing crypto APIs</div>
            
            <div id="results" style="margin-top: 2rem;">
                <p style="color: var(--muted); text-align: center;">
                    <span class="spinner"></span> Running tests...
                </p>
            </div>
            
            <div style="margin-top: 2rem; text-align: center;">
                <a href="/" class="btn btn-secondary" style="text-decoration: none; display: inline-block; width: auto; padding: 0.75rem 1.5rem;">
                    ← Back to Home
                </a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/hash-wasm@4/dist/argon2.umd.min.js"></script>
    <script>
        async function checkBrowser() {
            const results = [];
            const resultsDiv = document.getElementById('results');
            
            function addResult(name, status, details = '') {
                results.push({ name, status, details });
                updateDisplay();
            }
            
            function updateDisplay() {
                const html = results.map(r => {
                    const icon = r.status === 'ok' ? '✓' : r.status === 'fail' ? '✗' : '⚠';
                    const color = r.status === 'ok' ? 'var(--success)' : r.status === 'fail' ? 'var(--danger)' : 'var(--muted)';
                    return `
                        <div style="padding: 0.75rem; border-left: 3px solid ${color}; background: var(--surface2); border-radius: 6px; margin-bottom: 0.5rem;">
                            <div style="display: flex; align-items: center; gap: 0.75rem;">
                                <span style="font-size: 1.2rem;">${icon}</span>
                                <div style="flex: 1;">
                                    <div style="font-weight: 600; font-size: 0.9rem;">${r.name}</div>
                                    ${r.details ? `<div style="font-size: 0.75rem; color: var(--muted); font-family: var(--mono); margin-top: 0.25rem;">${r.details}</div>` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                resultsDiv.innerHTML = html;
            }
            
            try {
                // Check HTTPS
                if (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
                    addResult('Secure Context', 'ok', location.protocol === 'https:' ? 'HTTPS' : 'localhost (OK for testing)');
                } else {
                    addResult('Secure Context', 'fail', 'HTTPS required for crypto APIs');
                }
                
                // Check Web Crypto API
                if (window.crypto && window.crypto.subtle) {
                    addResult('Web Crypto API', 'ok', 'crypto.subtle available');
                } else {
                    addResult('Web Crypto API', 'fail', 'Not available');
                    return;
                }
                
                // Check Argon2id
                try {
                    const salt = new Uint8Array(16);
                    const result = await hashwasm.argon2id({
                        password: 'test',
                        salt: salt,
                        iterations: 1,
                        memorySize: 1024,
                        parallelism: 1,
                        hashLength: 32,
                        outputType: 'binary'
                    });
                    addResult('Argon2id (WASM)', 'ok', 'hash-wasm library loaded');
                } catch (err) {
                    addResult('Argon2id (WASM)', 'fail', err.message);
                }
                
                // Check X25519
                try {
                    const keypair = await crypto.subtle.generateKey(
                        { name: 'X25519' },
                        true,
                        ['deriveBits']
                    );
                    addResult('X25519 (ECDH)', 'ok', 'Supported');
                } catch (err) {
                    addResult('X25519 (ECDH)', 'fail', err.message);
                }
                
                // Check Ed25519
                try {
                    const keypair = await crypto.subtle.generateKey(
                        { name: 'Ed25519' },
                        true,
                        ['sign', 'verify']
                    );
                    addResult('Ed25519 (Signatures)', 'ok', 'Supported');
                } catch (err) {
                    addResult('Ed25519 (Signatures)', 'fail', err.message);
                }
                
                // Check AES-GCM
                try {
                    const key = await crypto.subtle.generateKey(
                        { name: 'AES-GCM', length: 256 },
                        true,
                        ['encrypt', 'decrypt']
                    );
                    addResult('AES-256-GCM', 'ok', 'Supported');
                } catch (err) {
                    addResult('AES-256-GCM', 'fail', err.message);
                }
                
                // Browser info
                const ua = navigator.userAgent;
                let browser = 'Unknown';
                if (ua.includes('Chrome/')) {
                    const version = ua.match(/Chrome\/(\d+)/);
                    browser = `Chrome ${version ? version[1] : '?'}`;
                } else if (ua.includes('Firefox/')) {
                    const version = ua.match(/Firefox\/(\d+)/);
                    browser = `Firefox ${version ? version[1] : '?'}`;
                } else if (ua.includes('Safari/') && !ua.includes('Chrome')) {
                    const version = ua.match(/Version\/(\d+)/);
                    browser = `Safari ${version ? version[1] : '?'}`;
                } else if (ua.includes('Edg/')) {
                    const version = ua.match(/Edg\/(\d+)/);
                    browser = `Edge ${version ? version[1] : '?'}`;
                }
                addResult('Browser', 'ok', browser);
                
                // Check if all passed
                const allPassed = results.every(r => r.status === 'ok');
                if (allPassed) {
                    resultsDiv.innerHTML += `
                        <div style="margin-top: 1.5rem; padding: 1rem; background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.3); border-radius: 8px; text-align: center;">
                            <div style="font-size: 1.2rem; margin-bottom: 0.5rem;">✓ All checks passed!</div>
                            <div style="color: var(--muted); font-size: 0.85rem;">Your browser supports all required features</div>
                            <a href="/register.html" class="btn btn-primary" style="margin-top: 1rem; display: inline-block; width: auto; text-decoration: none;">
                                Continue to Registration →
                            </a>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML += `
                        <div style="margin-top: 1.5rem; padding: 1rem; background: rgba(231, 76, 60, 0.1); border: 1px solid rgba(231, 76, 60, 0.3); border-radius: 8px;">
                            <div style="font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--danger);">⚠ Compatibility Issues</div>
                            <div style="color: var(--muted); font-size: 0.85rem; margin-bottom: 1rem;">
                                Your browser doesn't support all required features.
                            </div>
                            <div style="background: var(--surface2); padding: 1rem; border-radius: 6px; font-family: var(--mono); font-size: 0.75rem;">
                                <strong>Minimum requirements:</strong><br>
                                • Chrome 111+ / Edge 111+<br>
                                • Firefox 114+<br>
                                • Safari 16.4+<br><br>
                                <strong>Or try:</strong><br>
                                • Update your browser<br>
                                • Use HTTPS (not HTTP)<br>
                                • Try a different browser
                            </div>
                        </div>
                    `;
                }
                
            } catch (err) {
                resultsDiv.innerHTML = `
                    <div style="padding: 1rem; background: rgba(231, 76, 60, 0.1); border: 1px solid rgba(231, 76, 60, 0.3); border-radius: 8px;">
                        <div style="font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--danger);">✗ Error</div>
                        <div style="color: var(--muted); font-size: 0.85rem; font-family: var(--mono);">${err.message}</div>
                    </div>
                `;
            }
        }
        
        // Run checks on page load
        checkBrowser();
    </script>
</body>
</html>
