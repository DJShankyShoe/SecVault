<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecVault - Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div class="wrap">
        <div class="card">
            <div class="logo">
                <div class="logo-icon">🔐</div>
                <div class="logo-text">Sec<span>Vault</span></div>
            </div>
            
            <div class="title">Sign In</div>
            
            <form id="login-form">
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email" autofocus>
                </div>
                
                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                
                <div class="field">
                    <label for="pin">New Session PIN</label>
                    <input type="password" id="pin" name="pin" required autocomplete="off" minlength="11" maxlength="32">
                    <small style="color: var(--muted); font-size: 0.75rem;">11-32 characters (uppercase, lowercase, numbers, special characters)</small>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    Sign In
                </button>
            </form>
            
            <div class="switch">Don't have an account? <a href="/register.html">Create one</a></div>
        </div>
    </div>
    
    <div id="toast-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/hash-wasm@4/dist/argon2.umd.min.js"></script>
    <script type="module">
        import { handleLogin } from '/static/js/login.js';
        import { state } from '/static/js/state.js';
        
        // Redirect to dashboard if already logged in
        if (state.token) {
            window.location.href = '/dashboard.html';
        }
        
        document.getElementById('login-form').addEventListener('submit', handleLogin);
    </script>
</body>
</html>
